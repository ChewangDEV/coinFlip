<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
         <h1> Flip the Coin</h1>

         <h2 id="result"></h2>

         <img src="./dollar.png" alt="">

         <div class="counters">
            <p>Head: 0</p>
            <p>Tail: 0</p>
         </div>

        <div class="buttons">
            <button id="headBtn">Head</button>
            <button id="tailBtn">Tail</button>
        </div>

        <p id="choice">Choose First</p>

        <button id="flipBtn">Flip Coin</button>

    </div>

    <script src="./index.js"></script>
</body>
</html>
